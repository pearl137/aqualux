<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Aqualux Beverages</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font for Logo -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

    <style>
        /* General Body Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        /* Navbar */
        header {
            background: rgba(0,31,63,0.85); /* semi-transparent nav over background */
            position: fixed;
            width: 100%;
            z-index: 10;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 20px;
        }
        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 2em;
            font-weight: 700;
        }
        .logo span {
            font-weight: normal;
        }
        .nav-links {
            display: flex;
            gap: 25px;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1em;
            padding: 6px 10px;
        }
        .nav-links a.active {
            border-bottom: 2px solid #fff;
        }

        /* Hero Section with Full-Screen Background */
        .contact-hero {
            position: relative;
            height: 100vh;
            width: 100%;
            background-image: url('images/down.jpeg');
            background-size: cover; /* fills screen, preserves aspect ratio */
            background-position: center center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .contact-hero::before {
            content: "";
            position: absolute;
            top:0; left:0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5); /* overlay for readability */
        }

        /* Contact Details Overlay */
        .contact-details-overlay {
            position: relative;
            text-align: center;
            max-width: 700px;
            padding: 20px;
            z-index: 1;
        }
        .contact-details-overlay h1 {
            font-size: 3em;
            margin-bottom: 15px;
        }
        .contact-details-overlay p {
            font-size: 1.5em;
            margin: 8px 0;
        }

        /* Footer */
        footer {
            background: #001f3f;
            text-align: center;
            padding: 15px 0;
            font-size: 0.9em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .contact-details-overlay h1 { font-size: 2em; }
            .contact-details-overlay p { font-size: 1.2em; }
            .nav-links { gap: 15px; }
            .logo { font-size: 1.5em; }
        }
    </style>
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">AQUALUX <span>Beverages</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="product.html">Products</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>
</header>

<!-- Hero Section with Full-Screen Background and Contact Details -->
<section class="contact-hero">
    <div class="contact-details-overlay">
        <h1>Contact Us</h1>
        <p><strong>Location:</strong> Manzini, Eswatini</p>
        <p><strong>Phone:</strong> +268 7647 8769 | +268 7849 8491</p>
        <p><strong>Email:</strong> info@aqualux.com</p>
        <p><strong>Office Hours:</strong> Monday – Friday | 8:00 AM – 5:00 PM</p>
    </div>
</section>

<footer>
    <p>&copy; 2026 Aqualux Beverages (Pty) Ltd. All Rights Reserved.</p>
</footer>

</body>
</html>
